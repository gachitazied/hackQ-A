name: Build and Deploy

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm install
    
    - name: Create .env Configuration
      run: |
        cat > .env << EOF
        AZURE_OPENAI_ENDPOINT=${{ secrets.AZURE_OPENAI_ENDPOINT }}
        AZURE_OPENAI_API_KEY=${{ secrets.AZURE_OPENAI_API_KEY }}
        MODEL=${{ secrets.MODEL }}
        AZURE_SPEECH_ENDPOINT=${{ secrets.AZURE_SPEECH_ENDPOINT }}
        AZURE_SPEECH_KEY=${{ secrets.AZURE_SPEECH_KEY }}
        AZURE_SPEECH_REGION=${{ secrets.AZURE_SPEECH_REGION }}
        EOF
    
    - name: Start Server and Validate (Test Run)
      run: |
        node server.js &
        sleep 5
        curl --retry 3 --retry-delay 2 http://localhost:3000 || echo "Server start validation failed, but continuing..."
    

